<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Bornlogic</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --blue:       #2563EB;
      --blue-dk:    #1D4ED8;
      --green:      #16A34A;
      --red:        #DC2626;
      --amber:      #D97706;
      --purple:     #7C3AED;
      --bg:         #F1F5F9;
      --card:       #FFFFFF;
      --text:       #1E293B;
      --muted:      #64748B;
      --border:     #E2E8F0;
      --header-bg:  #0F172A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ───────────────────────────── */
    #login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--header-bg);
    }

    .login-box {
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 44px 52px;
      width: 360px;
      text-align: center;
    }

    .login-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #94A3B8;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .login-box h1 {
      color: #F8FAFC;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-box p {
      color: #64748B;
      font-size: 13px;
      margin-bottom: 32px;
    }

    .login-box input {
      width: 100%;
      padding: 13px 16px;
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #F8FAFC;
      font-size: 15px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color .15s;
    }

    .login-box input:focus { border-color: var(--blue); }

    .login-box button {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .login-box button:hover { background: var(--blue-dk); }

    #login-err {
      color: #F87171;
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── APP ─────────────────────────────── */
    #app { display: none; }

    /* ── HEADER ──────────────────────────── */
    header {
      background: var(--header-bg);
      color: #fff;
      height: 58px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid #1E293B;
    }

    .header-title {
      display: flex;
      flex-direction: column;
    }

    .header-title span:first-child {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #475569;
      text-transform: uppercase;
    }

    .header-title span:last-child {
      font-size: 16px;
      font-weight: 700;
      color: #F8FAFC;
      line-height: 1.1;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .period-btns {
      display: flex;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 7px;
      overflow: hidden;
    }

    .period-btn {
      background: transparent;
      border: none;
      color: #64748B;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .period-btn:not(:last-child) { border-right: 1px solid #334155; }

    .period-btn.active, .period-btn:hover {
      background: var(--blue);
      color: #fff;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748B;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22C55E;
      flex-shrink: 0;
    }

    .live-dot.pulsing { background: #F59E0B; animation: blink 1s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── MAIN ────────────────────────────── */
    main {
      padding: 26px 28px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── KPI GRID ────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }

    @media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 700px)  { .kpi-grid { grid-template-columns: repeat(2,1fr); } }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .kpi-delta {
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .kpi-delta.up   { color: var(--green); }
    .kpi-delta.down { color: var(--red); }
    .kpi-delta.flat { color: var(--muted); }

    .kpi-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── CHARTS GRID ─────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }

    .chart-card h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
    }

    .chart-wrap { position: relative; height: 232px; }

    /* ── FOOTER ──────────────────────────── */
    footer {
      text-align: center;
      padding: 18px;
      font-size: 12px;
      color: #94A3B8;
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════ -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">Bornlogic</div>
    <h1>Dashboard Financeiro</h1>
    <p>Acesso restrito à equipe interna</p>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Entrar</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════ -->
<div id="app">

  <header>
    <div class="header-title">
      <span>Bornlogic</span>
      <span>Dashboard Financeiro</span>
    </div>
    <div class="header-controls">
      <div class="period-btns">
        <button class="period-btn" onclick="setPeriod(6,this)">6m</button>
        <button class="period-btn active" onclick="setPeriod(12,this)">12m</button>
        <button class="period-btn" onclick="setPeriod(24,this)">24m</button>
        <button class="period-btn" onclick="setPeriod(0,this)">Tudo</button>
      </div>
      <div class="live-badge">
        <span class="live-dot" id="live-dot"></span>
        <span id="live-status">Ao vivo</span>
      </div>
    </div>
  </header>

  <main>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Faturamento vs MRR Retido &nbsp;<span style="font-weight:400;color:#94A3B8">(R$ mil)</span></h3>
        <div class="chart-wrap"><canvas id="c-revenue"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Movimentação de MRR &nbsp;<span style="font-weight:400;color:#94A3B8">(R$ mil)</span></h3>
        <div class="chart-wrap"><canvas id="c-mrr"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Evolução de Clientes &nbsp;<span style="font-weight:400;color:#94A3B8">(# clientes)</span></h3>
        <div class="chart-wrap"><canvas id="c-clients"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Folha Salarial vs Colaboradores</h3>
        <div class="chart-wrap"><canvas id="c-team"></canvas></div>
      </div>
    </div>
  </main>

  <footer id="footer">Última atualização: —</footer>
</div>

<script>
const SENHA_HASH = '32d79857b9f147b0a7e7c919675b4dab29c5d89d7c4d0fe2f05673b4bcbf7e68';
const SHEET_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTd0xQKharcAOkWu6Y7fMOBOLiM2o8Soqmehfa33CP41Fogi3MREW99brunju8e-w9ch75kYizT7phQ/pub?gid=0&single=true&output=csv';
const REFRESH_S  = 60;

let periodo  = 12;
let charts   = {};
let pwdHash  = null;

// ── Utilitários ───────────────────────────────────────────────

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function parseCSV(text) {
  return text.trim().split(/\r?\n/).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"')          { inQ = !inQ; }
      else if (ch===',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else                     { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseNum(s) {
  if (!s || /^[-–—\s]*$/.test(s.trim())) return 0;
  s = s.trim();
  // Remove R$, espaços e aspas
  s = s.replace(/[R$\s"]/g, '');
  // Formato brasileiro: 1.234,56 → tem vírgula como decimal
  if (s.includes(',') && s.includes('.')) return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
  // Só ponto: pode ser decimal (1.5) ou milhar (1.234)
  if (s.includes('.')) {
    const partes = s.split('.');
    // Se parte após ponto tem 3 dígitos → é separador de milhar
    if (partes[partes.length - 1].length === 3) return parseFloat(s.replace(/\./g,'')) || 0;
    return parseFloat(s) || 0;
  }
  // Só vírgula: separador decimal brasileiro (1,5)
  if (s.includes(',')) return parseFloat(s.replace(',','.')) || 0;
  return parseFloat(s) || 0;
}

function fmtK(v) {
  if (v === null || v === undefined) return '—';
  const abs = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (abs >= 1000) return sign + 'R$ ' + (abs/1000).toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1}) + 'M';
  return sign + 'R$ ' + Math.round(abs).toLocaleString('pt-BR') + 'k';
}

function fmtAxis(v) {
  const abs = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (abs >= 1000) return sign + (abs/1000).toLocaleString('pt-BR', {maximumFractionDigits:1}) + 'M';
  return sign + abs.toLocaleString('pt-BR') + 'k';
}

function fmtPct(v) {
  if (v === null) return '—';
  return (v >= 0 ? '▲ +' : '▼ ') + Math.abs(v).toFixed(1) + '%';
}

// ── Autenticação ──────────────────────────────────────────────

async function appInit() {
  pwdHash = SENHA_HASH;
  const saved = sessionStorage.getItem('auth');
  if (saved === pwdHash) mostrarApp();
}

async function login() {
  const v = document.getElementById('pwd').value;
  if (!v) return;
  const h = await sha256(v);
  if (h === pwdHash) {
    sessionStorage.setItem('auth', pwdHash);
    mostrarApp();
  } else {
    document.getElementById('login-err').textContent = 'Senha incorreta';
    document.getElementById('pwd').select();
  }
}

// ── Dashboard ─────────────────────────────────────────────────

function mostrarApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'block';
  carregarDados();
  setInterval(carregarDados, REFRESH_S * 1000);
}

async function carregarDados() {
  setLoading(true);
  try {
    const res  = await fetch(SHEET_URL + '&_=' + Date.now());
    const text = await res.text();
    processarDados(parseCSV(text));
    document.getElementById('footer').textContent =
      'Última atualização: ' + new Date().toLocaleString('pt-BR') +
      ' · atualiza a cada ' + REFRESH_S + 's';
  } catch (e) {
    const isCors = e.message && (e.message.includes('fetch') || e.message.includes('Failed'));
    document.getElementById('live-status').textContent = 'Erro ao carregar';
    document.getElementById('kpi-grid').innerHTML = `
      <div style="grid-column:1/-1;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:16px 20px;color:#991B1B;font-size:13px;line-height:1.6">
        <strong>Não foi possível carregar os dados.</strong><br>
        ${isCors
          ? 'Arquivo aberto direto do disco — o navegador bloqueia requisições externas nesse modo.<br><br>' +
            '<strong>Solução local:</strong> abra com <em>VS Code → Live Server</em> (botão "Go Live" na barra inferior) ' +
            'ou suba para o GitHub Pages.<br>' +
            '<strong>Detalhes:</strong> ' + e.message
          : 'Verifique se a planilha está publicada como CSV (Arquivo → Publicar na web → CSV).<br>' +
            '<strong>Detalhes:</strong> ' + e.message
        }
      </div>`;
    console.error(e);
  }
  setLoading(false);
}

function processarDados(rows) {
  if (rows.length < 2) return;

  // Encontra a linha do cabeçalho (primeira com 'Item')
  let headerIdx = 0;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].some(c => c.trim() === 'Item')) { headerIdx = i; break; }
  }

  const header     = rows[headerIdx];
  const itemCol    = header.findIndex(c => c.trim() === 'Item');
  const dataStart  = itemCol + 2; // pula Item + Unidade
  const meses      = header.slice(dataStart);

  const data = {};
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    const key = row[itemCol] ? row[itemCol].trim() : '';
    if (!key) continue;
    data[key] = row.slice(dataStart).map(parseNum);
  }

  console.log('[Dashboard] headerIdx:', headerIdx, '| itemCol:', itemCol, '| dataStart:', dataStart, '| Fat[0-2]:', (data['Faturamento']||[]).slice(0,3));

  // Índice do mês mais recente com Faturamento preenchido
  const fat = data['Faturamento'] || [];
  let refIdx = fat.length - 1;
  while (refIdx > 0 && fat[refIdx] === 0) refIdx--;

  renderKPIs(data, meses, refIdx);

  // Filtro de período para os gráficos
  const n      = periodo === 0 ? meses.length : Math.min(periodo, meses.length);
  const offset = meses.length - n;
  const labels = meses.slice(offset);
  const sl     = key => (data[key] || []).slice(offset);

  renderCharts(sl, labels);
}

// ── KPI Cards ─────────────────────────────────────────────────

function renderKPIs(data, meses, idx) {
  const get  = (key, i) => { const a = data[key] || []; return a[i] !== undefined ? a[i] : 0; };
  const cur  = key => get(key, idx);
  const prv  = key => idx > 0 ? get(key, idx - 1) : null;
  const dPct = key => {
    const p = prv(key);
    if (p === null || p === 0) return null;
    return ((cur(key) - p) / Math.abs(p)) * 100;
  };

  const fatAtual    = cur('Faturamento');
  const mrrAtual    = cur('MRR retido');
  const cliAtual    = cur('Total de Clientes');
  const prvCli      = prv('Total de Clientes');
  const novoMRR     = cur('Novo MRR');
  const upsell      = cur('Upsell');
  const mrrChurn    = cur('MRR Churn');
  const prvMRR      = prv('MRR retido');
  const colabs      = cur('Colaboradores');
  const prvColabs   = prv('Colaboradores');
  const folha       = cur('Folha Salarial Total');

  const netNew      = novoMRR + upsell + mrrChurn;
  const churnRate   = prvMRR && prvMRR > 0 ? (Math.abs(mrrChurn) / prvMRR) * 100 : 0;
  const prvChurnRate = null; // não calculamos variação do churn rate

  const rpc    = colabs   ? fatAtual / colabs   : 0;
  const prvRpc = prvColabs ? (prv('Faturamento') || 0) / prvColabs : null;
  const rpcDelta = prvRpc ? ((rpc - prvRpc) / prvRpc) * 100 : null;

  const cards = [
    {
      label: 'Faturamento',
      value: fmtK(fatAtual),
      delta: fmtPct(dPct('Faturamento')),
      good:  dPct('Faturamento') === null ? null : dPct('Faturamento') >= 0,
      sub:   meses[idx] || ''
    },
    {
      label: 'Clientes Ativos',
      value: String(cliAtual),
      delta: prvCli !== null ? fmtPct(dPct('Total de Clientes')) : '—',
      good:  dPct('Total de Clientes') === null ? null : dPct('Total de Clientes') >= 0,
      sub:   ''
    },
    {
      label: 'Net New MRR',
      value: fmtK(netNew),
      delta: netNew > 0 ? '▲ expansão' : netNew < 0 ? '▼ contração' : '→ neutro',
      good:  netNew >= 0,
      sub:   'novo + upsell + churn'
    },
    {
      label: 'MRR Churn Rate',
      value: churnRate.toFixed(1) + '%',
      delta: churnRate <= 2 ? '✓ dentro do limite' : '⚠ acima de 2%',
      good:  churnRate <= 2,
      sub:   'sobre MRR mês anterior'
    },
    {
      label: 'Folha Salarial',
      value: fmtK(folha),
      delta: fmtPct(dPct('Folha Salarial Total')),
      good:  dPct('Folha Salarial Total') === null ? null : dPct('Folha Salarial Total') <= 0,
      sub:   colabs + ' colaboradores'
    },
    {
      label: 'Receita / Colab.',
      value: rpc ? 'R$ ' + rpc.toFixed(1) + 'k' : '—',
      delta: fmtPct(rpcDelta),
      good:  rpcDelta === null ? null : rpcDelta >= 0,
      sub:   'faturamento ÷ headcount'
    }
  ];

  document.getElementById('kpi-grid').innerHTML = cards.map(c => {
    const cls = c.good === null ? 'flat' : c.good ? 'up' : 'down';
    return `
      <div class="kpi-card">
        <div class="kpi-label">${c.label}</div>
        <div class="kpi-value">${c.value}</div>
        <div class="kpi-delta ${cls}">${c.delta}</div>
        ${c.sub ? `<div class="kpi-sub">${c.sub}</div>` : ''}
      </div>`;
  }).join('');
}

// ── Gráficos ──────────────────────────────────────────────────

const C = {
  blue:   '#2563EB', blueFill:   'rgba(37,99,235,.10)',
  green:  '#16A34A', greenFill:  'rgba(22,163,74,.12)',
  red:    '#DC2626', redFill:    'rgba(220,38,38,.10)',
  amber:  '#D97706', amberFill:  'rgba(217,119,6,.10)',
  purple: '#7C3AED', purpleFill: 'rgba(124,58,237,.10)',
  gray:   '#94A3B8'
};

const baseOpts = (yFmt) => ({
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { position: 'bottom', labels: { boxWidth: 11, font: { size: 11 }, padding: 12 } },
    tooltip: { bodyFont: { size: 11 }, titleFont: { size: 11 } }
  },
  scales: {
    x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 9 } },
    y: {
      grid:  { color: '#F1F5F9' },
      ticks: { font: { size: 10 }, callback: yFmt || (v => v) }
    }
  }
});

function mkChart(id, cfg) {
  if (charts[id]) { charts[id].destroy(); }
  charts[id] = new Chart(document.getElementById(id).getContext('2d'), cfg);
}

function renderCharts(sl, labels) {
  // 1. Faturamento vs MRR Retido
  mkChart('c-revenue', {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Faturamento',
          data: sl('Faturamento'),
          borderColor: C.blue, backgroundColor: C.blueFill,
          fill: true, tension: .35, pointRadius: 3, pointHoverRadius: 5
        },
        {
          label: 'MRR Retido',
          data: sl('MRR retido'),
          borderColor: C.green, backgroundColor: 'transparent',
          borderDash: [5,3], tension: .35, pointRadius: 3, pointHoverRadius: 5
        }
      ]
    },
    options: baseOpts(v => 'R$' + v + 'k')
  });

  // 2. Movimentação de MRR
  mkChart('c-mrr', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Novo MRR',
          data: sl('Novo MRR'),
          backgroundColor: C.green, borderRadius: 3
        },
        {
          label: 'Upsell',
          data: sl('Upsell'),
          backgroundColor: C.blue, borderRadius: 3
        },
        {
          label: 'MRR Churn',
          data: sl('MRR Churn'),
          backgroundColor: C.red, borderRadius: 3
        }
      ]
    },
    options: {
      ...baseOpts(v => 'R$' + v + 'k'),
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 9 } },
        y: {
          grid: { color: '#F1F5F9' },
          ticks: { font: { size: 10 }, callback: v => 'R$ ' + fmtAxis(v) },
          stacked: false
        }
      }
    }
  });

  // 3. Clientes — linha total + barras novo/churn eixo secundário
  mkChart('c-clients', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type:  'line',
          label: 'Total Clientes',
          data:  sl('Total de Clientes'),
          borderColor: C.purple, backgroundColor: C.purpleFill,
          fill: true, tension: .35, pointRadius: 3, pointHoverRadius: 5,
          yAxisID: 'yTotal', order: 1
        },
        {
          type:  'bar',
          label: 'Novos',
          data:  sl('Novos Clientes'),
          backgroundColor: C.green, borderRadius: 3,
          yAxisID: 'yDelta', order: 2
        },
        {
          type:  'bar',
          label: 'Logo Churn',
          data:  sl('Logo Churn').map(v => -v),
          backgroundColor: C.red, borderRadius: 3,
          yAxisID: 'yDelta', order: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 11, font: { size: 11 }, padding: 12 } },
        tooltip: { bodyFont: { size: 11 }, titleFont: { size: 11 } }
      },
      scales: {
        x:      { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 9 } },
        yTotal: { position: 'left',  grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 } } },
        yDelta: { position: 'right', grid: { display: false }, ticks: { font: { size: 10 }, stepSize: 1 } }
      }
    }
  });

  // 4. Folha Salarial vs Headcount
  mkChart('c-team', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type:  'bar',
          label: 'Folha Salarial (R$ mil)',
          data:  sl('Folha Salarial Total'),
          backgroundColor: C.amberFill,
          borderColor: C.amber,
          borderWidth: 1.5,
          borderRadius: 3,
          yAxisID: 'yFolha'
        },
        {
          type:  'line',
          label: 'Colaboradores',
          data:  sl('Colaboradores'),
          borderColor: C.gray, backgroundColor: 'transparent',
          tension: .35, pointRadius: 3, pointHoverRadius: 5,
          yAxisID: 'yColab'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 11, font: { size: 11 }, padding: 12 } },
        tooltip: { bodyFont: { size: 11 }, titleFont: { size: 11 } }
      },
      scales: {
        x:      { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 9 } },
        yFolha: { position: 'left',  grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 }, callback: v => 'R$ ' + fmtAxis(v) } },
        yColab: { position: 'right', grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

// ── UI helpers ────────────────────────────────────────────────

function setPeriod(p, btn) {
  periodo = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  carregarDados();
}

function setLoading(on) {
  const dot = document.getElementById('live-dot');
  const txt = document.getElementById('live-status');
  dot.className = 'live-dot' + (on ? ' pulsing' : '');
  txt.textContent = on ? 'Atualizando…' : 'Ao vivo · ' + REFRESH_S + 's';
}

// ── Boot ──────────────────────────────────────────────────────
appInit();
</script>
